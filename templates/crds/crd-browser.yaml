{{- if .Values.crds.enabled }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
    {{- if .Values.crds.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
  name: browsers.browser.selenosis.io
spec:
  group: browser.selenosis.io
  names:
    kind: Browser
    listKind: BrowserList
    plural: browsers
    shortNames:
    - brw
    singular: browser
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.browserName
      name: Browser
      type: string
    - jsonPath: .spec.browserVersion
      name: Version
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.podIP
      name: PodIP
      type: string
    - jsonPath: .status.startTime
      name: StartTime
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            properties:
              browserName:
                minLength: 1
                type: string
              browserVersion:
                minLength: 1
                type: string
            required:
            - browserName
            - browserVersion
            type: object
          status:
            properties:
              containerStatuses:
                items:
                  properties:
                    image:
                      type: string
                    name:
                      type: string
                    ports:
                      items:
                        properties:
                          containerPort:
                            format: int32
                            maximum: 65535
                            minimum: 1
                            type: integer
                          hostPort:
                            format: int32
                            maximum: 65535
                            minimum: 1
                            type: integer
                          name:
                            type: string
                          protocol:
                            type: string
                        required:
                        - containerPort
                        type: object
                      type: array
                      x-kubernetes-list-type: atomic
                    restartCount:
                      format: int32
                      type: integer
                    state:
                      properties:
                        running:
                          properties:
                            startedAt:
                              format: date-time
                              type: string
                          type: object
                        terminated:
                          properties:
                            containerID:
                              type: string
                            exitCode:
                              format: int32
                              type: integer
                            finishedAt:
                              format: date-time
                              type: string
                            message:
                              type: string
                            reason:
                              type: string
                            signal:
                              format: int32
                              type: integer
                            startedAt:
                              format: date-time
                              type: string
                          required:
                          - exitCode
                          type: object
                        waiting:
                          properties:
                            message:
                              type: string
                            reason:
                              type: string
                          type: object
                      type: object
                  required:
                  - name
                  - restartCount
                  type: object
                type: array
                x-kubernetes-list-type: atomic
              message:
                type: string
              phase:
                type: string
              podIP:
                type: string
              reason:
                type: string
              startTime:
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
